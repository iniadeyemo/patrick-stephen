<!doctype html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#561370">
    <title>Avatar</title>
    <meta name="description" content="Patrick Stephen Widow App">
    <meta name="keywords"
        content="widows, foundation, patrick stephen" >
    <link rel="icon" type="image/png" href="assets/img/favicon.png" sizes="32x32">

    <link rel="apple-touch-icon" sizes="180x180" href="assets/img/icon/192x192.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="manifest" href="manifest.json">

    <script src="assets/js/app.js"></script>
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/index.js"></script>
       <!--Bootstrap icon-->
        <link rel="stylesheet" href="assets/icons/bootstrap icons/bootstrap-icons.css">
</head>

<body>
    
    <!-- Preloader -->
    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <!-- App Header -->
    <div class="appHeader bg-primary-grad text-light rounded-bottom">
        <div class="left">
            <a href="#" class="headerButton goBack">
                <i class='bi bi-chevron-left'></i>
            </a>
        </div>
        <div class="pageTitle">
            Change Avatar
        </div>
        <div class="right">
        
        </div>
    </div>
    <!-- * App Header -->

    <!-- App Capsule -->
    <div id="appCapsule">

        <div class="section mt-5" >

            <div class="radio-group row" id="radio-group">

            </div>

            <div class="form-group mt-3 transparent">
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="editBtn">Save changes</button>
            </div>

        </div>


    </div>
    <!-- * App Capsule -->
    
    <div id="toastPopup" class="toast-box toast-top">
        <a id="toastPopupA" class="text-light">
            <div class="in">
                <div class="text" id="toast-content">
                    
                </div>
            </div>
        </a>
        <button type="button" class="btn btn-sm btn-text-light close-button">OK</button>
    </div>

    <div class="modal fade dialogbox" id="res" data-bs-backdrop="static" tabindex="-2" style="z-index:99999999999" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content border">
                <div class="modal-icon" id='resicon'>
                    
                </div>
                <div class="modal-header">
                    <h5 class="modal-title" id='restitle'></h5>
                </div>
                <div class="modal-body" id = "resbody">

                    
                </div>
                <div class="modal-footer" id="resfooter">
                    <div class='btn-inline'><a href='#' class='btn btn-text-primary' data-bs-dismiss='modal'>Ok</a></div>
                </div>
            </div>
        </div>
    </div>

        
      <!-- ========= JS Files =========  -->
    <!-- Bootstrap -->
    <script src="assets/js/lib/bootstrap.bundle.min.js"></script>
    <!-- Ionicons -->
    
    <!-- Splide -->
    <script src="assets/js/plugins/splide/splide.min.js"></script>
    <!-- Base Js File -->
    <script src="assets/js/base.js"></script><script src="assets/js/index.umd.min.js"></script>


    <script>
        
        $(document).ready(function() {
            loaddata();
            $("#editBtn").click(function() {

                document.getElementById("editBtn").disabled = true;
                $("#editBtn").html('Validating <span class="spinner-grow spinner-grow-sm m-1" role="status" aria-hidden="true"></span>');

                let selAvi = getSelectedAvatar();
                if (selAvi){
                    
                    const retrievedUserString = sessionStorage.getItem("user");

                    if (retrievedUserString) {
                        userId = retrievedUser.id;

                            
                        var postData = {
                            avatar: selAvi,
                            id: userId
                        };

                        $.ajax({
                            type: "POST",
                            url: SITE_URL+"changeAvatar.php",
                            data: JSON.stringify(postData),
                            crossDomain: true,
                            cache: false,
                            contentType:"application/json",
                            dataType:"JSON", 

                            beforeSend: function() {
                                $("#editBtn").html('Proccessing <span class="spinner-grow spinner-grow-sm m-1" role="status" aria-hidden="true"></span>');

                            },
                            success: function(response) {
                                
                                $("#editBtn").html('Save changes');
                                document.getElementById("editBtn").disabled = false;
                                if (response.length > 0){
                                    data = response[0].status;
                                    // 
                                    if (data == "success") {
                                        
                                        document.getElementById("toastPopup").classList.add("bg-success");
                                        document.getElementById("toastPopup").classList.remove("bg-danger");
                                        document.getElementById("toastPopup").classList.remove("bg-info");
                                    
                                        document.getElementById("toastPopupA").href = "#";
                                        document.getElementById("toast-content").innerHTML = "Avatar successfully updated!";

                                        let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                                        toast.show();

                                    }else {
                                        document.getElementById("toastPopup").classList.add("bg-danger");
                                        document.getElementById("toastPopup").classList.remove("bg-success");
                                        document.getElementById("toastPopup").classList.remove("bg-info");

                                        document.getElementById("toastPopupA").href = "#";
                                        document.getElementById("toast-content").innerHTML = `There was a server error. Retry`
                                        let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                                        toast.show();

                                    }
                                }else{
                                    document.getElementById("toastPopup").classList.add("bg-danger");
                                    document.getElementById("toastPopup").classList.remove("bg-success");
                                    document.getElementById("toastPopup").classList.remove("bg-info");

                                    document.getElementById("toastPopupA").href = "#";
                                    document.getElementById("toast-content").innerHTML = `There was a server error. Retry`
                                    let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                                    toast.show();
                                }

                            },
                            error: function(XMLHttpRequest, textStatus, errorThrown){
                                document.getElementById("editBtn").disabled = false;
                                $("#editBtn").html('Save changes');

                                document.getElementById("toastPopup").classList.add("bg-danger");
                                document.getElementById("toastPopup").classList.remove("bg-success");
                                document.getElementById("toastPopup").classList.remove("bg-info");

                                document.getElementById("toastPopupA").href = "#";document.getElementById("toast-content").innerHTML = `There was a server error. Retry`
                                let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                                toast.show();
                            }
                        });
                        
                    }
                }else{
                    document.getElementById("toastPopup").classList.remove("bg-success");
                    document.getElementById("toastPopup").classList.add("bg-danger");
                    document.getElementById("toastPopup").classList.remove("bg-info");
                    
                    document.getElementById("toastPopupA").href = "#";
                    document.getElementById("toast-content").innerHTML = "No avatar selected";

                    let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                    toast.show();

                    document.getElementById("editBtn").disabled = false;
                    $("#editBtn").html('Save changes');
                }
                
            });
        });

        function loaddata(){
            const retrievedUserString = sessionStorage.getItem("user");

            document.getElementById("editBtn").disabled = true;
            if (retrievedUserString) {
                userId = retrievedUser.id;
                
                $.ajax({
                    type: "GET",
                    url: SITE_URL+`ws.php?user=${userId}&avatars=`, 
                    dataType:"JSON",
                    crossDomain: true,
                    cache: false,
                    beforeSend: function () { 
                        document.getElementById("radio-group").innerHTML = "Loading...";
                    },
                    success: function (response) {
                        
                        if (response.length > 0){
                            $('#radio-group').empty();

                            
                            for (var i = 0 ; i < response.length ; i++){
                                avatar_id = response[i].avatar_id;
                                avatar_link = response[i].avatar_link;

                                sel = "";
                                if (i === 0){
                                    sel = "checked";
                                }
                                avatarHead = 
                                `<div class='col-4 text-center p-3'>
                                    <input type='radio' id='avatar${avatar_id}' name='avatar' value='${avatar_id}' ${sel}>
                                    <label for='avatar${avatar_id}' class='rounded me-2'>
                                        <img src='${SITE_URL_NORM}${avatar_link}' alt='avatar' class='w-100'>
                                    </label>
                                </div>`;

                                $('#radio-group').append(avatarHead); 

                            }

                            document.getElementById("editBtn").disabled = false;

                        }else{
                            document.getElementById("radio-group").innerHTML = `<p class="alert alert-warning" role="alert">
                                No avatars to display
                            </p>`    
                        }
                    },
                    error: function(jqXHR, textStatus, errorThrown){

                        document.getElementById("radio-group").innerHTML = `<p class="alert alert-danger" role="alert">
                            A server error occured while generating avatars. Please try again
                        </p>`
                        
                    }
                }); 
            }
        }
        

        function getSelectedAvatar() {
            let selectedAvatar = $('input[name="avatar"]:checked').val();
            
            if (selectedAvatar) {
                
                return selectedAvatar;
            } else {
                
                return null;
            }
        }
        /* global PullToRefresh */
        PullToRefresh.init({
            mainElement: '#appCapsule',
            onRefresh: function() { location.reload(); }
        });
    </script>
</body>

</html>
