    <!-- ========= JS Files =========  -->

    <!-- Base Js File -->
    <script src="assets/js/base.js"></script><script src="assets/js/index.umd.min.js"></script>

    <script>
        $(document).ready(function() {
            function loadBlog (page){
                $.ajax({
                    type: "GET",
                    url: SITE_URL+`ws.php?page=${page}&blog=`, 
                    dataType:"JSON",
                    crossDomain: true,
                    cache: false,
                    beforeSend: function () { 
                        document.getElementById("data-container").innerHTML = "Loading...";
                    },
                    success: function (response) {
                        
                        if (response.length > 0){
                            curPage = response[0].page;
                            document.getElementById("curPage").innerHTML = curPage;
                        
                            $('#data-container').empty();
                            
                            $.each(response[0].blog, function(index, item) {
                                // Example: Display data in a table or list
                                blogd = `${item.blog_date}`;
                                if (blogd == "New"){
                                    dateSty = "fw-bold text-primary"
                                    displayBD = `<i class='bi bi-record-circle me-1'></i> New Article`
                                }else{
                                    dateSty = ""
                                    displayBD = blogd
                                }
                                
                                blogHead = 
                                `<a href='blog-post.html?id=${item.blog_id}' class="item">
                                    <div class="detail">
                                        <img src="${SITE_URL_NORM}${item.blog_image}" alt="${item.blog_title}" class="w-25 rounded me-2">
                                        <div>
                                            <strong>${item.blog_title}</strong>
                                            <p class='${dateSty}'>${displayBD}</p>
                                        </div>
                                    </div>
                                </a>`;

                                $('#data-container').append(blogHead); //adapt to your table structure.

                            });


                            // Generate pagination links
                            $('#pagination-container').empty();
                            for (var i = 1; i <= response[0].total_pages; i++) {
                                if (i == response[0].page) {
                                     // Current page
                                    link = `<a href="#" class="btn m-1 btn-primary"> ${i} </a>`;
                                }else{
                                    link = `<a href="#" class="page-link btn m-1 btn-outline-primary" data-page="${i}"> ${i} </a>`;
                                }
                                
                                
                                $('#pagination-container').append(link);
                            }

                            // Attach click event to pagination links
                            $('.page-link').click(function(e) {
                                e.preventDefault();
                                var page = $(this).data('page');
                                loadBlog(page);
                            });
                        }else{
                            
                        }
                    },
                    error: function(jqXHR, textStatus, errorThrown){
                        document.getElementById("curPage").innerHTML = "[null]";
                        document.getElementById("data-container").innerHTML = ""
                        document.getElementById("pgErr").innerHTML = 
                        `<p class="alert alert-danger" role="alert">
                            A server error occured while generating blog articles. Please try again
                        </p>`;
                    }
                }); 
            }

            loadBlog (1);
        });
        /* global PullToRefresh */
        PullToRefresh.init({
            mainElement: '#appCapsule',
            onRefresh: function() { location.reload(); }
        });
    </script>
