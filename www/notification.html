  <!-- ========= JS Files =========  -->
    <!-- Bootstrap -->
    <script src="assets/js/lib/bootstrap.bundle.min.js"></script>
    <!-- Ionicons -->
    
    <!-- Splide -->
    <script src="assets/js/plugins/splide/splide.min.js"></script>
    <!-- Base Js File -->
    <script src="assets/js/base.js"></script><script src="assets/js/index.umd.min.js"></script>

    <script>
        let offset = 0;
        let limit = 20;
        let total_record = 0;
        let loading = false;
        

        function getNotifs(user){
            if (loading) return;
            loading = true;
            $("#loading").show();

            $.ajax({
                type: "GET",
                url: SITE_URL+`ws.php?n_user=${user}&offset=${offset}&getnotifs=`, 
                dataType:"JSON",
                crossDomain: true,
                cache: false,
                beforeSend: function () { 
                },
                success: function (response) {
                    
                    if (response.length > 0){
                        offset += limit;
                        sessNC = sessionStorage.getItem("notifcount");
                        if(!sessNC){
                            sessNC = 0;
                            currentCount = 0;
                        }else{
                            currentCount = sessNC - response.length;    
                            if (currentCount < 0){
                                currentCount = 0;
                            }
                        }

                        sessionStorage.setItem('notifcount', currentCount);

                        for (var i = 0; i < response.length; i++ ){

                            notif_id = response[i].notif_id;
                            notif_desc = response[i].notif_desc;
                            notif_url = response[i].notif_url;
                            notif_date = response[i].notif_date;
                            seen = response[i].seen;
                            notif_type_title = response[i].notif_type_title;
                            notif_type_icon = response[i].notif_type_icon;
                            notif_type_theme = response[i].notif_type_theme;
                            total_record = parseInt(response[i].total_record);

                            notif_desc = notif_desc.replace(/\[/g, "<");
                            notif_desc = notif_desc.replace(/\]/g, ">");
                            
                            if(seen == "0"){
                                act = "active"
                            }else{
                                act = ""
                            }
                            notifHead =
                            `<li class="${act}">
                                <a href="${notif_url}" class="item">
                                    <div class="icon-box ${notif_type_theme}">
                                        ${notif_type_icon}
                                    </div>
                                    <div class="in">
                                        <div>
                                            <div class="mb-05"><strong>${notif_type_title}</strong></div>
                                            <div class="text-small mb-05">${notif_desc}</div>
                                            <div class="text-xsmall">${notif_date}</div>
                                        </div>
                                    </div>
                                </a>
                            </li>`
                            $('#notifCont').append(notifHead);
                            
                        }

                    }else{
                        //No notification
                        $(window).off("scroll");
                    
                        if(total_record == 0){
                            $('#notifCont').append(`<div class="fw-light mt-3 text-center">
                                No notification
                            </div>`);
                        }
                        

                    }
                },complete: function() {
                    loading = false;
                    $("#loading").hide();
                },
                error: function(jqXHR, textStatus, errorThrown){

                    document.getElementById("notifCont").innerHTML = 
                    `<p class="alert alert-danger" role="alert">
                        A server error occured while retrieving your notifications. Please try again
                    </p>`;
                }
            }); 
        }

        $(document).ready(function() {
            const retrievedUserString = sessionStorage.getItem("user");
            if (retrievedUserString) {
                userId = retrievedUser.id;
                
            }
            getNotifs(userId);

              // Infinite scroll
              $(window).scroll(function() {
                if ($(window).scrollTop() + $(window).height() >= $(document).height() - 100) {
                    getNotifs(userId);
                }
            });
        });
        
        /* global PullToRefresh */
        PullToRefresh.init({
            mainElement: '#appCapsule',
            onRefresh: function() { location.reload(); }
        });
    </script>
</body>
