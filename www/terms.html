    <script>
        $(document).ready(function() {
            var xmlhttp = new XMLHttpRequest();
            xmlhttp.onreadystatechange = function() {
            if (this.readyState == 4 && this.status == 200) {
                
                response = JSON.parse(this.responseText);
                terms = response[0].terms;
                
                
                var fterms = terms.replace(/\[/g, "<");
                fterms = fterms.replace(/\]/g, ">");

                document.getElementById("termsContent").innerHTML = `${fterms}`;
            }
            };
            xmlhttp.open("GET",SITE_URL+`ws.php?getAbout=`,true);
            xmlhttp.send();
        });
        /* global PullToRefresh */
        PullToRefresh.init({
            mainElement: '#appCapsule',
            onRefresh: function() { location.reload(); }
        });
    </script>
