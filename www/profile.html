    <script>
        $(document).ready(function() {
            //NAME 
            const retrievedUserString = sessionStorage.getItem("user");

            if (retrievedUserString) {
                // Parse the JSON string back into a JavaScript object
                retrievedUser = JSON.parse(retrievedUserString);
                userName = retrievedUser.name;
                userEmail = retrievedUser.email;
                userId = retrievedUser.id;
                document.getElementById("userName").innerHTML = userName;
                document.getElementById("userEmail").innerHTML = userEmail;

                //GET AVATAR #avi
                let defAvi = "assets/img/avatar.png";
                $.ajax({
                    type: "GET",
                    url: SITE_URL+`ws.php?user=${userId}&avatar=`, 
                    dataType:"JSON",
                    crossDomain: true,
                    cache: false,
                    beforeSend: function () {},
                    success: function (response) {
                        
                        if (response.length > 0){
                            avatar_link = response[0].avatar_link;

                            document.getElementById("avi").src = `${SITE_URL_NORM}${avatar_link}`;
                            console.log ("Avatar successfully loaded")
                        }else{
                            document.getElementById("avi").src = `${defAvi}`;
                            console.log ("No Avatar found")
                        }
                    },
                    error: function(jqXHR, textStatus, errorThrown){
                        document.getElementById("avi").src = `${defAvi}`;
                        console.log ("Error loading Avatar")
                                            
                    }
                }); 

            }
        });
        /* global PullToRefresh */
        PullToRefresh.init({
            mainElement: '#appCapsule',
            onRefresh: function() { location.reload(); }
        });
    </script>
