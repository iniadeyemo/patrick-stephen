<!doctype html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

        content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover" />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>Change Password</title>
    <meta name="description" content="Patrick Stephen Widow App">
    <meta name="keywords"
        content="widows, foundation, patrick stephen" >
    <link rel="icon" type="image/png" href="assets/img/favicon.png" sizes="32x32">

    <link rel="apple-touch-icon" sizes="180x180" href="assets/img/icon/192x192.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="manifest" href="manifest.json">

    <script src="assets/js/app.js"></script>
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/index.js"></script>
       <!--Bootstrap icon-->
        <link rel="stylesheet" href="assets/icons/bootstrap icons/bootstrap-icons.css">
</head>

<body>
    
    <!-- Preloader -->
    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <!-- App Header -->
    <div class="appHeader bg-primary-grad text-light rounded-bottom">
        <div class="left">
            <a href="#" class="headerButton goBack">
                <i class='bi bi-chevron-left'></i>
            </a>
        </div>
        <div class="pageTitle">
            Change Password
        </div>
        <div class="right">
        
        </div>
    </div>
    <!-- * App Header -->

    <!-- App Capsule -->
    <div id="appCapsule">

        <div class="section mt-5" style="padding: 0;">

            <div class="card shadow-none">
                <div class="card-body pb-1">
                    <div class="form-group boxed">
                        <div class="input-wrapper">
                            <label>Current password</label>
                            <input type="password" class="form-control custom_input pt-4 pb-4" id="currPass" placeholder="Current Password">
                            <i class="clear-input">
                                <i class='bi bi-x-circle-fill text-danger'></i>
                            </i>
                        </div>
                    </div>

                    <div class="form-group boxed">
                        <div class="input-wrapper">
                            <label>New password</label>
                            <input type="password" class="form-control custom_input pt-4 pb-4" id="newPass" placeholder="New Password" oninput="chkpass()">
                            <i class="clear-input">
                                <i class='bi bi-x-circle-fill text-danger'></i>
                            </i>
                        </div>
                        <div class="input-info px-3 pb-0">
                            <ul>
                                <li class="text-secondary" id="upper_error">Must contain one uppercase </li>
                                <li class="text-secondary" id="lower_error">Must contain one lowercase</li>
                                <li  class ="text-secondary" id="number_error">Must contain number</li>
                                <li  class ="text-secondary" id="char_error">Must contain at least six (6) characters</li>
                            </ul>
                        </div>
                        <div class="input-info text-danger px-3" id="password_error"></div>
                    </div>

                    <div class="form-group boxed">
                        <div class="input-wrapper">
                            <label>Confirm New password</label>
                            <input type="password" class="form-control custom_input pt-4 pb-4" id="confirmPass" placeholder="Confirm Password" oninput="chkpass()">
                            <i class="clear-input">
                                <i class='bi bi-x-circle-fill text-danger'></i>
                            </i>
                        </div>
                    </div>

                </div>
            </div>

            <div class="form-group p-2 transparent">
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="editBtn">Update Password</button>
            </div>

        </div>


    </div>
    <!-- * App Capsule -->
    
    <div id="toastPopup" class="toast-box toast-top">
        <a id="toastPopupA" class="text-light">
            <div class="in">
                <div class="text" id="toast-content">
                    
                </div>
            </div>
        </a>
        <button type="button" class="btn btn-sm btn-text-light close-button">OK</button>
    </div>

    

        
      <!-- ========= JS Files =========  -->
    <!-- Bootstrap -->
    <script src="assets/js/lib/bootstrap.bundle.min.js"></script>
    <!-- Ionicons -->
    
    <!-- Splide -->
    <script src="assets/js/plugins/splide/splide.min.js"></script>
    <!-- Base Js File -->
    <script src="assets/js/base.js"></script><script src="assets/js/index.umd.min.js"></script>


    <script>

        function chkpass(){
            var newPass = $("#newPass").val();
            var confirmPass = $("#confirmPass").val();
            
            i_pass2 = document.getElementById("confirmPass");
            i_pass1 = document.getElementById("newPass");
            char_error = document.getElementById("char_error");
            lower_error = document.getElementById("lower_error");
            upper_error = document.getElementById("upper_error");
            number_error = document.getElementById("number_error");
            var err = 1;

            if (newPass !== confirmPass){
                
                i_pass2.classList.add("border-danger");

            }else{
                i_pass2.classList.remove("border-danger");
               
                i_pass2.classList.add("border-success");
            }

            if ($.trim(newPass).length < 6){
                err = 1;
               
                char_error.classList.remove("text-secondary");
                char_error.classList.add("text-danger");

            }else{
                err = 0;
                
                char_error.classList.remove("text-danger");
                char_error.classList.add("text-success");
            }

            if(!/[a-z]/.test(newPass) ){
                err = 1;
                
               lower_error.classList.remove("text-secondary");
                lower_error.classList.add("text-danger");
            }else{
                err = 0;
                lower_error.classList.remove("text-danger");
                lower_error.classList.add("text-success");
            }
         
            if(!/[A-Z]/.test(newPass) ){
                err = 1;
                
               upper_error.classList.remove("text-secondary");
                upper_error.classList.add("text-danger");
            }else{
                err = 0;
                upper_error.classList.remove("text-danger");
                upper_error.classList.add("text-success");
            }

            if(!/[0-9]/.test(newPass) ){
                err = 1;
                
               number_error.classList.remove("text-secondary");
               number_error.classList.add("text-danger");
            }else{
                err = 0;
                number_error.classList.remove("text-danger");
                number_error.classList.add("text-success");
            }

            if (err === 1){
                i_pass1.classList.add("border-danger");
            }else if (err === 0){
                i_pass1.classList.remove("border-danger");
                i_pass1.classList.add("border-success");
            }
        }
        
        $(document).ready(function() {

            $("#editBtn").click(function() {

                var currPass = $("#currPass").val();
                var newPass = $("#newPass").val();
                var confirmPass = $("#confirmPass").val();

                document.getElementById("editBtn").disabled = true;
                $("#editBtn").html('Validating <span class="spinner-grow spinner-grow-sm m-1" role="status" aria-hidden="true"></span>');


                if (($.trim(currPass).length <= 0 )){
                    document.getElementById("toastPopup").classList.remove("bg-success");
                    document.getElementById("toastPopup").classList.add("bg-danger");
                    document.getElementById("toastPopup").classList.remove("bg-info");
                    document.getElementById("toastPopupA").href = "#";
                    document.getElementById("toast-content").innerHTML = "Input your current password!";
                    
                    let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                    toast.show();

                    document.getElementById("editBtn").disabled = false;
                $("#editBtn").html('Update Password');
                                        
                }else if (($.trim(newPass).length = 0 )){
                    document.getElementById("toastPopup").classList.remove("bg-success");
                    document.getElementById("toastPopup").classList.add("bg-danger");
                    document.getElementById("toastPopup").classList.remove("bg-info")
                    document.getElementById("toastPopupA").href = "#";
                    document.getElementById("toast-content").innerHTML = "Input new password!";
                    
                    let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                    toast.show();

                    document.getElementById("editBtn").disabled = false;
                $("#editBtn").html('Update Password');
                                        
                }else if ($.trim(newPass).length < 6){
                    document.getElementById("toastPopup").classList.remove("bg-success");
                    document.getElementById("toastPopup").classList.add("bg-danger");
                    document.getElementById("toastPopup").classList.remove("bg-info")
                    document.getElementById("toastPopupA").href = "#";
                    document.getElementById("toast-content").innerHTML = "New password has to be at least six (6) characters";

                    let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                    toast.show();

                    document.getElementById("editBtn").disabled = false;
                $("#editBtn").html('Update Password');

                }else if(!/[a-z]/.test(newPass) || !/[A-Z]/.test(newPass) || !/[0-9]/.test(newPass)) {
                    document.getElementById("toastPopup").classList.remove("bg-success");
                    document.getElementById("toastPopup").classList.add("bg-danger");
                    document.getElementById("toastPopup").classList.remove("bg-info")
                    document.getElementById("toastPopupA").href = "#";
                    document.getElementById("toast-content").innerHTML = "New password must contain at least one uppercase, lowecase and number";

                    let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                    toast.show();

                    document.getElementById("editBtn").disabled = false;
                $("#editBtn").html('Update Password');
                    
                }else if (newPass != confirmPass){
                    document.getElementById("toastPopup").classList.remove("bg-success");
                    document.getElementById("toastPopup").classList.add("bg-danger");
                    document.getElementById("toastPopup").classList.remove("bg-info")
                    document.getElementById("toastPopupA").href = "#";
                    document.getElementById("toast-content").innerHTML = "New password don't match!";
                    
                    let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                    toast.show();

                    document.getElementById("editBtn").disabled = false;
                $("#editBtn").html('Update Password');
                                        
                }else{
                    const retrievedUserString = sessionStorage.getItem("user");

                    if (retrievedUserString) {
                        userId = retrievedUser.id;


                        var postData = {
                            currPass: currPass,
                            newPass: newPass,
                            id: userId
                        };

                        $.ajax({
                            type: "POST",
                            url: SITE_URL+"changePass.php",
                            data: JSON.stringify(postData),
                            crossDomain: true,
                            cache: false,
                            contentType:"application/json",
                            dataType:"JSON", 

                            beforeSend: function() {
                                $("#editBtn").html('Proccessing <span class="spinner-grow spinner-grow-sm m-1" role="status" aria-hidden="true"></span>');

                            },
                            success: function(response) {
                                
                                document.getElementById("editBtn").disabled = false;
                                $("#editBtn").html('Update Password');

                                document.getElementById("editBtn").disabled = false;
                                if (response.length > 0){
                                    data = response[0].status;
                                    // 
                                    if (data == "success") {

                                        document.getElementById("currPass").value = "";
                                        document.getElementById("newPass").value = "";
                                        document.getElementById("confirmPass").value = "";

                                        document.getElementById("toastPopup").classList.add("bg-success");
                                        document.getElementById("toastPopup").classList.remove("bg-danger");
                                        document.getElementById("toastPopup").classList.remove("bg-info");
                                        document.getElementById("toastPopupA").href = "#";
                                        document.getElementById("toast-content").innerHTML = "Password successfully updated!";

                                        let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                                        toast.show();
                                    }else if (data == "wrong") {

                                        document.getElementById("toastPopup").classList.remove("bg-success");
                                        document.getElementById("toastPopup").classList.add("bg-danger");
                                        document.getElementById("toastPopup").classList.remove("bg-info");
                                        document.getElementById("toastPopupA").href = "#";
                                        document.getElementById("toast-content").innerHTML = "Your current password is incorrect. You can logout and use the forgot password option";

                                        let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                                        toast.show();
                                    }else if (data == "same") {

                                        document.getElementById("toastPopup").classList.remove("bg-success");
                                        document.getElementById("toastPopup").classList.add("bg-danger");
                                        document.getElementById("toastPopup").classList.remove("bg-info");
                                        document.getElementById("toastPopupA").href = "#";
                                        document.getElementById("toast-content").innerHTML = "Your new password and old password are the same!";

                                        let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                                        toast.show();
                                    }else {
                                        document.getElementById("toastPopup").classList.add("bg-danger");
                                        document.getElementById("toastPopup").classList.remove("bg-success");
                                        document.getElementById("toastPopup").classList.remove("bg-info");
                                        document.getElementById("toastPopupA").href = "#";
                                        document.getElementById("toast-content").innerHTML = `There was a server error. Retry`
                                        let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                                        toast.show();

                                    }
                                }else{
                                    document.getElementById("toastPopup").classList.add("bg-danger");
                                    document.getElementById("toastPopup").classList.remove("bg-success");
                                    document.getElementById("toastPopup").classList.remove("bg-info");
                                    document.getElementById("toastPopupA").href = "#";
                                    document.getElementById("toast-content").innerHTML = `There was a server error. Retry`
                                    let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                                    toast.show();
                                }

                            },
                            error: function(XMLHttpRequest, textStatus, errorThrown){
                                $("#editBtn").html('Update Password');
                                document.getElementById("editBtn").disabled = false;

                                document.getElementById("toastPopup").classList.add("bg-danger");
                                document.getElementById("toastPopup").classList.remove("bg-success");
                                document.getElementById("toastPopup").classList.remove("bg-info");
                                document.getElementById("toastPopupA").href = "#";
                                document.getElementById("toast-content").innerHTML = `There was a server error. Retry`
                                let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                                toast.show();

                                document.getElementById("editBtn").disabled = false;
                                $("#editBtn").html('Update Password');
                            }
                        });

                    }
                    
                }


                

            });
        });

        /* global PullToRefresh */
        PullToRefresh.init({
            mainElement: '#appCapsule',
            onRefresh: function() { location.reload(); }
        });
    </script>
</body>
