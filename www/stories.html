    <script>

        function openModalWithStoryId(storyId) {
            hiddenTrigger = document.getElementById('hiddenTrigger');
            hiddenTrigger.setAttribute('data-bs-id', storyId);
            hiddenTrigger.click(); // Simulate a click to trigger the modal
         }

        storyModal = document.getElementById('storyModal')
        storyModal.addEventListener('show.bs.modal', event => {
            // Button that triggered the modal
            const button = event.relatedTarget
            // Extract info from data-bs-* attributes
            
            storyId = button.getAttribute('data-bs-id')

            document.getElementById("storyContent").innerHTML = "Loading...";

            var xmlhttp = new XMLHttpRequest();
            xmlhttp.onreadystatechange = function() {
            if (this.readyState == 4 && this.status == 200) {
                
                response = JSON.parse(this.responseText);
                if(response.length > 0){
                    story_content = response[0].story_content;
                    story_author = response[0].story_author;
                    
                    authorFName = getFirstWord(story_author);
                    story_content = story_content.replace(/\[/g, "<");
                    story_content = story_content.replace(/\]/g, ">");

                    story_author = `${authorFName}'s story`
                    document.getElementById("storyContent").innerHTML = story_content;
                    document.getElementById("storyAuthor").innerHTML = story_author;
                }else{
                    document.getElementById("storyContent").innerHTML = `<p class="alert alert-danger">This story has been deleted. You can read another story</p>`;
                }
            }
            };
            xmlhttp.open("GET",SITE_URL+`ws.php?getstory=${storyId}`,true);
            xmlhttp.send();
        });

        
        function loadvideo(){
            $.ajax({
                    type: "GET",
                    url: SITE_URL+`ws.php?video=`, 
                    dataType:"JSON",
                    crossDomain: true,
                    cache: false,
                    beforeSend: function () { 
                        
                    },
                    success: function (response) {
                        
                        if (response.length > 0){
                            video_src = response[0].video_src;
                            
                            const videoElement = document.querySelector('#myVideo');
                            // Change the src attribute
                            videoElement.src = `${SITE_URL_NORM}${video_src}`;

                            // Important: You might need to reload the video to apply the change
                            videoElement.load();
                            
                        }else{
                            document.getElementById("videoErr").innerHTML = 
                            `<p class="alert alert-danger" role="alert">
                                There's no video to load
                            </p>`;    
                        }
                    },
                    error: function(jqXHR, textStatus, errorThrown){
                        
                        document.getElementById("videoErr").innerHTML = 
                        `<p class="alert alert-danger" role="alert">
                            A server error occured while loading video. Please try again
                        </p>`;
                    }
                }); 
            
        }
      
        
        let offset = 0;
        let limit = 8;
        let total_record = 0;
        let loading = false;


        function getStories(){

            if (loading) return;
            loading = true;
            $("#loading").show();

            $.ajax({
                type: "GET",
                url: SITE_URL+`ws.php?offset=${offset}&getstories=`, 
                dataType:"JSON",
                crossDomain: true,
                cache: false,
                beforeSend: function () { 
                },
                success: function (response) {
                    
                    if (response.length > 0){
                        offset += limit;
                        

                        let bgClasses = [];
                        for (i = 1 ; i <= 40 ; i++){
                            bgClasses.push(i);
                            
                        }


                        for (i = bgClasses.length ; i > 1 ; i--){
                            j = Math.floor(Math.random() * (i + 1));
                            [bgClasses[i], bgClasses[j]] = [bgClasses[j], bgClasses[i]];
                        }


                        for (var i = 0; i < response.length; i++){

                            total_record  = response[i].total_record;
                            story_id  = response[i].story_id;
                            story_summary  = response[i].story_summary;
                            story_author  = response[i].story_author;

                            const bgClass = bgClasses[i % 40];
                            
                            storyHead =
                            `<div class="masonry-item" data-bs-toggle="modal" data-bs-target="#storyModal"  data-bs-id="${story_id}" >
                                <div class="card border-purple-${bgClass} shadow p-2 rounded txt-sm">
                                    <div class="mb-1 fw-bold text-truncate">${story_author}</div>
                                    <div class=" text-justify">
                                        ${story_summary}...
                                        <b><u>Continue reading</u></b>
                                    </div>
                                </div>
                            </div>
                            `
                            $('#data-container').append(storyHead);
                            
                        }

                    }else{
                        //No stories
                        $(window).off("scroll");
                    
                        if(total_record == 0){
                            $('#data-container').append(`<div class="fw-light mt-3 text-center">
                                No story to display
                            </div>`);
                        }
                        

                    }
                },complete: function() {
                    loading = false;
                    $("#loading").hide();
                },
                error: function(jqXHR, textStatus, errorThrown){

                    document.getElementById("data-container").innerHTML = 
                    `<p class="alert alert-danger" role="alert">
                        A server error occured while loading stories. Please try again
                    </p>`;
                }
            });

            
        }

        $(document).ready(function() {
            loadvideo();

            const retrievedUserString = sessionStorage.getItem("user");
            if (retrievedUserString) {
                userId = retrievedUser.id;
            }

            openId = getParameterByName("openId");
            if(openId){
                openModalWithStoryId(openId);
            }
            getStories();

              // Infinite scroll
              $(window).scroll(function() {
                if ($(window).scrollTop() + $(window).height() >= $(document).height() - 100) {
                    getStories();
                }
            });

            const video = document.getElementById('myVideo');
            video.addEventListener('click', () => {
                if (video.requestFullscreen) {
                    video.requestFullscreen();
                } else if (video.webkitRequestFullscreen) { // For older Safari
                    video.webkitRequestFullscreen();
                } else if (video.msRequestFullscreen) { // For older IE/Edge
                    video.msRequestFullscreen();
                }
            });            
            
        });
        /* global PullToRefresh */
        PullToRefresh.init({
            mainElement: '#appCapsule',
            onRefresh: function() { location.reload(); }
        });
    </script>
