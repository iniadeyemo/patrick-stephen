<body class="bg-white">

    <!-- Preloader -->
    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <!-- App Header -->
    <div class="appHeader bg-primary-grad text-light rounded-bottom">
        <div class="left">
            <a href="#" class="headerButton goBack">
                <i class='bi bi-chevron-left'></i>
            </a>
        </div>
        <div class="pageTitle">

        </div>

    <!-- * App Header -->

    <!-- App Capsule -->  
    <div id="appCapsule" class="full-height">
        <div class="section full bg-light p-2 pt-5">
            <div id="pgErr"></div>
            <h2 id="forumTitle">
                [DiscussionTitle]
            </h2>

            <div class="forum-header-info my-3 lh-sm text-capitalize">
                Created:
                <span id="forumUser">

                </span>  
                <span class="mx-1 text-primary">|</span>
                <span id="forumDate">
                    [DiscussionDate]
                </span>
            </div>
            <div class="lead">
                <span id="forumSummary">[DiscussionSummary]</span>

        <div class="section full">
            <div class="section-title mb-2 bg-secondary sticky-section">Contribution (<span id="commentCount">NULL</span>)</div>

    <!-- * App Capsule -->

    <div id="toastPopup" class="toast-box toast-top">

            </div>

    <!-- App Bottom Menu -->

        <button class="btn-close ms-2" aria-label="Close" onclick="hideReplyCont()"></button>
    </div>
    <div class="chatFooter">
        <div class="form-group basic w-100">
            <div class="input-wrapper">
                <input type="text" class="form-control" id="contributeInput" placeholder="Contribute..." maxlength="500">
                
            </div>
        </div>
        <button type="button" class="btn btn-icon btn-primary" id="contributeBtn"  onclick="addComment()">
            <i class='bi bi-send'></i>
        </button>
        
    </div>
    <!-- * App Bottom Menu -->

    <div class="modal fade dialogbox" id="res" data-bs-backdrop="static" tabindex="-2" style="z-index:99999999999" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content border">
                <div class="modal-icon" id='resicon'>
                   
                </div>
                <div class="modal-header">
                    <h5 class="modal-title" id='restitle'></h5>
                </div>
                <div class="modal-body" id = "resbody">

                    
                </div>

        </div>

    <!-- Comment Dialog -->
    <div class="modal fade dialogbox" id="CommentDialog" 
        data-bs-backdrop="static" tabindex="-1" role="dialog">

            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"></h5>
                    <button class="btn-close ms-2" aria-label="Close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-start mb-2" id="commentPopupHead">



                </div>
            </div>
        </div>
    </div>
    <!-- * Comment Dialog -->

    <!-- ========= JS Files =========  -->
    <!-- Bootstrap -->
    <script src="assets/js/lib/bootstrap.bundle.min.js"></script>
    <!-- Ionicons -->
    
    <!-- Splide -->
    <script src="assets/js/plugins/splide/splide.min.js"></script>
    <!-- Base Js File -->
    <script src="assets/js/base.js"></script><script src="assets/js/index.umd.min.js"></script>

    <script>
        let offset = 0;
        let limit = 15;
        let total_record = 0;
        let loading = false;
        
        contributeInput = document.getElementById("contributeInput");
        contributeInputmaxLength = contributeInput.maxLength;

        contributeInput.addEventListener("input", function () {
            if (this.value.length >= contributeInputmaxLength) {
                this.value = this.value.substring(0, contributeInputmaxLength);
                document.getElementById("toastPopupA").href = "#";document.getElementById("toast-content").innerHTML = `Comment has reached character limit (${contributeInputmaxLength} char)`
                document.getElementById("toastPopup").classList.remove("bg-success");
                document.getElementById("toastPopup").classList.add("bg-danger");
                document.getElementById("toastPopup").classList.remove("bg-info");
                let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                toast.show();
            }
            
        });

        function hideReplyCont(){
            document.getElementById("contributeInput").placeholder = "Contribute...";
            document.getElementById("replyId").value = "0";
            
            document.getElementById("replyBox").classList.add("d-none");
            document.getElementById("replyBox").classList.remove("d-flex");
            document.getElementById("replyContent").innerHTML = "";
        }
        
        function popReply(commentId){
            commentUser = document.getElementById(`commentUser${commentId}`).innerHTML;  
            commentContent = document.getElementById(`commentContent${commentId}`).innerHTML; 
            document.getElementById("contributeInput").placeholder = `Reply to ${commentUser}`;
            document.getElementById("replyId").value = commentId;

            
            replyContent = `<b class="text-primary">${commentUser}</b> <span>${commentContent}</span>`;
            document.getElementById("replyContent").innerHTML = replyContent;
            
            document.getElementById("replyBox").classList.remove("d-none");
            document.getElementById("replyBox").classList.add("d-flex");
        }

        function addComment(){
            reply = document.getElementById("replyId").value;
            commentCont = document.getElementById("contributeInput").value;
            //Get discussion and user
            forumId = getParameterByName("id");
            const retrievedUserString = sessionStorage.getItem("user");
            if (retrievedUserString) {
                commentUser = retrievedUser.id;
            }

            trimmedCC = commentCont.trim();
            if (trimmedCC == ""){
                document.getElementById("toastPopup").classList.add("bg-danger");
                document.getElementById("toastPopup").classList.remove("bg-success");
                document.getElementById("toastPopup").classList.remove("bg-info");

                document.getElementById("toastPopupA").href = "#";document.getElementById("toast-content").innerHTML = `Comment can't be empty`
                let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                toast.show();
            }else{
                var postData = {
                    reply: reply,
                    comment: trimmedCC,
                    user: commentUser,
                    forum: forumId
                };

                $.ajax({
                    type: "POST",
                    url: SITE_URL+"addcoment.php",
                    data: JSON.stringify(postData),
                    crossDomain: true,
                    cache: false,
                    contentType:"application/json",
                    dataType:"JSON", 

                    beforeSend: function() {

                    },
                    success: function(response) {
                        if (response.length > 0){
                            data = response[0].status;
                            if (data == "success") {
                                document.getElementById("toastPopup").classList.add("bg-success");
                                document.getElementById("toastPopup").classList.remove("bg-danger");
                                document.getElementById("toastPopup").classList.remove("bg-info");

                                if(reply != "0"){
                                    document.getElementById("toastPopupA").href = "#";document.getElementById("toast-content").innerHTML = `Reply posted`
                                }else{
                                    document.getElementById("toastPopupA").href = "#";document.getElementById("toast-content").innerHTML = `Comment posted`
                                }
                                let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                                toast.show();

                                forumId = getParameterByName("id");
                                const retrievedUserString = sessionStorage.getItem("user");

                            if (retrievedUserString) {
                                userId = retrievedUser.id;

                                offset = 0;
                                limit = 15;
                                total_record = 0;
                                loading = false;
                                $('#forumComments').empty();
                                
                                getComments(userId, forumId);

                            }
                            
                            }else {
                                document.getElementById("toastPopup").classList.add("bg-danger");
                                document.getElementById("toastPopup").classList.remove("bg-success");
                                document.getElementById("toastPopup").classList.remove("bg-info");

                                document.getElementById("toastPopupA").href = "#";document.getElementById("toast-content").innerHTML = `There was a server error. Retry`
                                let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                                toast.show();
                            

                            }
                        }else{
                            document.getElementById("toastPopup").classList.add("bg-danger");
                            document.getElementById("toastPopup").classList.remove("bg-success");
                            document.getElementById("toastPopup").classList.remove("bg-info");

                            document.getElementById("toastPopupA").href = "#";document.getElementById("toast-content").innerHTML = `There was a server error. Retry`
                            let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                            toast.show();
                        }

                    },
                    error: function(XMLHttpRequest, textStatus, errorThrown){
                        document.getElementById("toastPopup").classList.add("bg-danger");
                        document.getElementById("toastPopup").classList.remove("bg-success");
                        document.getElementById("toastPopup").classList.remove("bg-info");

                        document.getElementById("toastPopupA").href = "#";document.getElementById("toast-content").innerHTML = `There was a server error. Retry`
                        let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                        toast.show();
                    }
                });


                hideReplyCont();
                document.getElementById("contributeInput").value = "";
            }
        }


        function getInView(id){
            // Popup

            var chkM = document.querySelector(".modal.show");
            if(chkM){
                
                bsM = bootstrap.Modal.getInstance(chkM);
                bsM.hide();

            }
            const retrievedUserString = sessionStorage.getItem("user");
            if (retrievedUserString) {
                user = retrievedUser.id;

                $.ajax({
                    type: "GET",
                    url: SITE_URL+`ws.php?fc_user=${user}&forumComment=${id}`, 
                    dataType:"JSON",
                    crossDomain: true,
                    cache: false,
                    beforeSend: function () { 
                        $("commentPopupHead").html(`Loading comment...`);
                    },
                    success: function (responseC) {
                        if (responseC.length > 0){
                            comment_id = responseC[0].comment_id;
                            comment_content = responseC[0].comment_content;
                            comment_date = responseC[0].comment_date;
                            comment_user = responseC[0].comment_user;
                            comment_user_id = responseC[0].comment_user_id;
                            parent_content = responseC[0].parent_content;
                            parent = responseC[0].parent;
                            og_parent = responseC[0].og_parent;
                            parent_user = responseC[0].parent_user;
                            parent_user_id = responseC[0].parent_user_id;
                            likes = responseC[0].likes;
                            dislikes = responseC[0].dislikes;
                            user_reaction = responseC[0].user_reaction;
                            avatar_link = responseC[0].avatar_link;
                            
                            trash_bin = ``
                            avatar = `<img src="${SITE_URL_NORM}${avatar_link}" alt="avatar" width='17' class="rounded">`
                            if (comment_user_id == user){
                                comment_name_dis = "You";
                                
                            }else{
                                comment_name_dis = comment_user;

                            }

                            if(user_reaction){
                                if (user_reaction == "1"){
                                    //You like
                                    like_icon = `<i class='bi bi-hand-thumbs-up-fill text-danger me-1'></i>`;
                                    dislike_icon = `<i class='bi bi-hand-thumbs-down me-1'></i>`;
                                }else{
                                    //You dislike

                                    like_icon = `<i class='bi bi-hand-thumbs-up me-1'></i>`;
                                    dislike_icon = `<i class='bi bi-hand-thumbs-down-fill text-warning me-1'></i>`;
                                }
                            }else{
                                //No reaction
                                like_icon = `<i class='bi bi-hand-thumbs-up me-1'></i>`;
                                dislike_icon = `<i class='bi bi-hand-thumbs-down me-1'></i>`;
                            }
                            comment_name_dis = getFirstWord(comment_name_dis);
                            if (comment_date == "New"){
                                comment_date = "New Comment";
                                
                                if (comment_user_id == user){
                                    trash_bin = `<span class="txt-sm me-2 d-flex justify-content-start align-items-center text-danger" onclick="deleteComment('${comment_id}')" data-bs-dismiss="modal"><i class="bi bi-trash3-fill me-1"></i> Delete</span>`
                                }
                            }     
                            
                            if (parent == "0"){
                                if(og_parent !== "0"){
                                
                                    reply = ` <span class='mx-1'>~</span> reply` 

                                    parentHead = `
                                    <div class="bg-light-danger px-1 mt-1 mx-2 text-small rounded-pill
                                    border-start border-danger border-5 text-truncate" style="width:95%">
                                        Deleted Comment
                                    </div>`;        
                                }else{
                                    parentHead = ``;    
                                    reply = ``;
                                }
                            }else{
                                
                                reply = ` <span class='mx-1'>~</span> reply` 
                                if (parent_user_id == user){
                                    parent_name_dis = "You"
                                }else{
                                    parent_name_dis = getFirstWord(parent_user);
                                }
                                parentHead = `<a onclick="getInView('${parent}')">
                                        <div class="bg-light px-1 txt-sm
                                            border-start border-5 rounded-pill text-truncate">
                                            <b>${parent_name_dis}</b>:  ${parent_content}
                                        </div>
                                    </a>`;
                                
                            }
                            commentPopupHead =
                            `
                            <li class="d-block" id="commenthead${comment_id}">
                                <div class='mb-1 text-primary txt-sm d-flex justify-content-between'>
                                    <span> ${avatar} <span id="commentUser${comment_id}">${comment_name_dis}</span> <span>${reply}</span></span> 
                                    <span>${comment_date}</span>
                                </div>
                                ${parentHead}
                                <p class="m-0 p-0" id="commentContent${comment_id}">${comment_content}</p>
                                <div class="mt-1 d-flex justify-content-start align-items-center">
                                    <span class="text-small me-2 d-flex justify-content-start align-items-center" onclick="addReaction('${user}', '1', '${comment_id}')"><span class='likeicon-${comment_id}'>${like_icon}</span> <span class='likes-${comment_id}'>${likes}</span></span>
                                    <span class="text-small me-2 d-flex justify-content-start align-items-center" onclick="addReaction('${user}', '2', '${comment_id}')"><span class='dislikeicon-${comment_id}'>${dislike_icon}</span> <span class='dislikes-${comment_id}'>${dislikes}</span></span>
                                    <span class="text-small me-2 d-flex justify-content-start align-items-center text-primary" onclick="popReply('${comment_id}')" data-bs-dismiss="modal"><i class='bi bi-chat-text me-1'></i> Reply</span>
                                    ${trash_bin}
                                    
                                </div>
                            </li>`
                            
                             
                            $("#commentPopupHead").html(commentPopupHead);
                            
                        }else{
                            $("#commentPopupHead").html(`<p class='text-danger'>We couldn't load the comment. It might have been deleted or there's a temporary issue. Please try again.</p>`);
                        }
                    },
                    error: function(jqXHR, textStatus, errorThrown){
                        $("#commentPopupHead").html(`There was a server error while loading comment. Try again`);
                    }
                });

                var CommentDialog = new bootstrap.Modal(document.getElementById('CommentDialog'))
                CommentDialog.show();
            }else{

            }
            
               
            
            
        }

        function deleteComment(id){
            $("#resicon").html(`<i class="bi bi-patch-question-fill text-danger"></in>`);
            $("#restitle").html("Delete Comment");
            $("#resbody").html("Are you sure you want to delete this comment? This step is irreversible");
            $("#resfooter").html(`<div class='btn-inline'><button class='btn btn-text-danger' data-bs-dismiss='modal' onclick="deleteCom('${id}')">Delete</button><a class='btn btn-text-secondary' data-bs-dismiss='modal'>Dismiss</a></div>`);
            var myModal2 = new bootstrap.Modal(document.getElementById('res'))
            myModal2.show();
        }

        function deleteCom(id){
            var postData = {
                comment: id
            };

            $.ajax({
                type: "POST",
                url: SITE_URL+"deletecoment.php",
                data: JSON.stringify(postData),
                crossDomain: true,
                cache: false,
                contentType:"application/json",
                dataType:"JSON", 

                beforeSend: function() {

                },
                success: function(response) {
                    if (response.length > 0){
                        data = response[0].status;
                        if (data == "success") {
                            document.getElementById("toastPopup").classList.add("bg-success");
                            document.getElementById("toastPopup").classList.remove("bg-danger");
                            document.getElementById("toastPopup").classList.remove("bg-info");

                            document.getElementById("toastPopupA").href = "#";document.getElementById("toast-content").innerHTML = `Comment deleted successfully`
                            let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                            toast.show();

                            forumId = getParameterByName("id");
                            const retrievedUserString = sessionStorage.getItem("user");

                        if (retrievedUserString) {
                            userId = retrievedUser.id;

                            offset = 0;
                            limit = 15;
                            total_record = 0;
                            loading = false;
                            $('#forumComments').empty();

                            getComments(userId, forumId);

                        }
                        
                        }else {
                            document.getElementById("toastPopup").classList.add("bg-danger");
                            document.getElementById("toastPopup").classList.remove("bg-success");
                            document.getElementById("toastPopup").classList.remove("bg-info");

                            document.getElementById("toastPopupA").href = "#";document.getElementById("toast-content").innerHTML = `There was a server error. Retry`
                            let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                            toast.show();
                           

                        }
                    }else{
                        document.getElementById("toastPopup").classList.add("bg-danger");
                        document.getElementById("toastPopup").classList.remove("bg-success");
                        document.getElementById("toastPopup").classList.remove("bg-info");

                        document.getElementById("toastPopupA").href = "#";document.getElementById("toast-content").innerHTML = `There was a server error. Retry`
                        let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                        toast.show();
                    }

                },
                error: function(XMLHttpRequest, textStatus, errorThrown){
                    document.getElementById("toastPopup").classList.add("bg-danger");
                    document.getElementById("toastPopup").classList.remove("bg-success");
                    document.getElementById("toastPopup").classList.remove("bg-info");

                    document.getElementById("toastPopupA").href = "#";document.getElementById("toast-content").innerHTML = `There was a server error. Retry`
                    let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                    toast.show();
                }
            });
        }

        function addReaction(user, type, comment){
            
            forumId = getParameterByName("id");

            var postData = {
                user: user,
                type: type,
                commentId: comment,
                forum: forumId
            };
            $.ajax({
                type: "POST",
                url: SITE_URL+"addReaction.php",
                data: JSON.stringify(postData),
                crossDomain: true,
                cache: false,
                contentType:"application/json",
                dataType:"JSON", 

                beforeSend: function() {

                },
                success: function(response) {
                    if (response.length > 0){
                        data = response[0].status;

                        //get Comment
                        $.ajax({
                            type: "GET",
                            url: SITE_URL+`ws.php?fc_user=${user}&forumComment=${comment}`, 
                            dataType:"JSON",
                            crossDomain: true,
                            cache: false,
                            beforeSend: function () { 
                            },
                            success: function (responseC) {
                                if (responseC.length > 0){
                                    
                                    likes = responseC[0].likes;
                                    dislikes = responseC[0].dislikes;
                                    user_reaction = responseC[0].user_reaction;
                                    
                                    if(user_reaction){
                                        if (user_reaction == "1"){
                                            //You like
                                            like_icon = `<i class='bi bi-hand-thumbs-up-fill text-danger me-1'></i>`;
                                            dislike_icon = `<i class='bi bi-hand-thumbs-down me-1'></i>`;
                                        }else{
                                            //You dislike
                                            like_icon = `<i class='bi bi-hand-thumbs-up me-1'></i>`;
                                            dislike_icon = `<i class='bi bi-hand-thumbs-down-fill text-warning me-1'></i>`;
                                        }
                                    }else{
                                        //No reaction
                                        like_icon = `<i class='bi bi-hand-thumbs-up me-1'></i>`;
                                        dislike_icon = `<i class='bi bi-hand-thumbs-down me-1'></i>`;
                                    }
                                    
                                    
                                    document.querySelectorAll('.likes-'+comment).forEach(element1 => {
                                        element1.innerHTML = likes;
                                    })           
                                    
                                    document.querySelectorAll('.dislikes-'+comment).forEach(element2 => {
                                        element2.innerHTML = dislikes;
                                    })

                                    document.querySelectorAll('.likeicon-'+comment).forEach(element3 => {
                                        element3.innerHTML = like_icon;
                                    })

                                    document.querySelectorAll('.dislikeicon-'+comment).forEach(element4 => {
                                        element4.innerHTML = dislike_icon;
                                    })
                                    

                                    
                                }else{
                                }
                            },
                            error: function(jqXHR, textStatus, errorThrown){}
                        });     
                        
                        if (data == "success") {
                            document.getElementById("toastPopup").classList.add("bg-success");
                            document.getElementById("toastPopup").classList.remove("bg-danger");
                            document.getElementById("toastPopup").classList.remove("bg-info");
                            if (type == "1"){
                                notifTxt = `You liked a comment`;
                                

                            }else{
                                notifTxt = `You disliked a comment`;
                                
                            }
                            
                            document.getElementById("toastPopupA").href = "#";document.getElementById("toast-content").innerHTML = notifTxt;
                            let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                            toast.show();
                        
                        }else if(data == "removed"){
                            document.getElementById("toastPopup").classList.add("bg-success");
                            document.getElementById("toastPopup").classList.remove("bg-danger");
                            document.getElementById("toastPopup").classList.remove("bg-info");
                            if (type == "1"){
                                notifTxt = `You unliked a comment`;
                                
                            }else{
                                notifTxt = `You removed a dislike on a comment`;
                                
                            }
                            
                            document.getElementById("toastPopupA").href = "#";document.getElementById("toast-content").innerHTML = notifTxt;
                            let toast = new bootstrap.Toast(document.getElementById('toastPopup'));
                            toast.show();
                            
                        }else if(data == "updated"){
                            document.getElementById("toastPopup").classList.add("bg-success");
                            document.getElementById("toastPopup").classList.remove("bg-danger");
                            document.getElementById("toastPopup").classList.remove("bg-info");
                            if (type == "1"){
                                notifTxt = `You liked a comment`;

        function getComments(user, forum){

                                comment_name_dis = comment_user;
                                user_bg=``
                                avatar = `<img src="${SITE_URL_NORM}${avatar_link}" alt="avatar" class="avatar">`

                                dislike_icon = `<i class='bi bi-hand-thumbs-down me-1'></i>`;
                            }
                            comment_name_dis = getFirstWord(comment_name_dis);
                            if (comment_date == "New"){
                                comment_date = "New Comment";
                                
                                if (comment_user_id == user){
                                    trash_bin = `<span class="text-small me-2 d-flex justify-content-start align-items-center text-danger" onclick="deleteComment('${comment_id}')"><i class='bi bi-trash3-fill me-1'></i> Delete</span>`
                                }
                            }     
                            
                            if (parent == "0"){
                                if(og_parent !== "0"){
                                
                                    reply = ` <span class='mx-1'>~</span> reply` 

                                    parentHead = `
                                    <div class="bg-light-danger px-1 mt-1 mx-2 text-small rounded-pill
                                    border-start border-danger border-5 text-truncate" style="width:95%">
                                        Deleted Comment
                                    </div>`;    
                                }else{
                                    parentHead = ``;    
                                    reply = ``;

                                }
                            }else{
                                
                                reply = ` <span class='mx-1'>~</span> reply` 
                                if (parent_user_id == user){
                                    parent_name_dis = "You"
                                    
                                }else{
                                    parent_name_dis = getFirstWord(parent_user);

                                <div class="content w-100">

                                    </div>
                                    ${parentHead}

                                    </div>

        }

        function makeSumSmal(){ 
            const summary = document.getElementById("forumSummary");
            const button = document.getElementById("toggleButton");
            const fullText = summary.innerText;
            const maxLength = 150;
            
            if (fullText.length > maxLength) {
                
                const shortText = fullText.slice(0, maxLength) + "...";
                let isExpanded = false;

                summary.innerText = shortText;
                button.style.display = "inline";

                button.addEventListener("click", function () {
                    if (isExpanded) {
                        summary.innerText = shortText;
                        button.innerText = "See More";
                    } else {
                        summary.innerText = fullText;
                        button.innerText = "See Less";
                    }
                    isExpanded = !isExpanded;
                });
            }
        }
