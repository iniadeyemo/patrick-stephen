    <meta name="keywords"
        content="widows, foundation, patrick stephen" >
    <link rel="icon" type="image/png" href="assets/img/favicon.png" sizes="32x32">

    <link rel="apple-touch-icon" sizes="180x180" href="assets/img/icon/192x192.png">

    <link rel="manifest" href="manifest.json">

    <script src="assets/js/app.js"></script>
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/index.js"></script>

    <!--Bootstrap icon-->
    <link rel="stylesheet" href="assets/icons/bootstrap icons/bootstrap-icons.css">
</head>

<body>

    <!-- Preloader -->
    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <!-- App Header -->
    <div class="appHeader bg-primary-grad text-light rounded-bottom">
        <div class="left">
            <a href="#" class="headerButton goBack">
                <i class='bi bi-chevron-left'></i>
            </a>
        </div>
        <div class="pageTitle">
            About
        </div>
        <div class="right">
            
        </div>
    </div>
    <!-- * App Header -->

    <!-- App Capsule -->
    <div id="appCapsule">


        <div class="section full">
            <img src="assets/img/about-us.png" alt="image" class="imaged w-100 square">
        </div>

        <div class="section mt-3 mb-3">
            <div class="card">
                <div class="card-body">
                    <h2 class="card-title">About us</h2>
                    <div id="aboutSummary">Loading...</div>
                </div> 
            </div>
        </div>

        <div class="section mt-3 mb-3">
            <div class="card">
                <div class="card-body" id="aboutContent">
                    Loading...
                </div>
            </div>
        </div>


        <div class="section mt-3 mb-3">
            <div class="card">
                <div class="card-body">
                    <h2 class="card-title">Have a Question?</h2>
                    <p>Feel free to contact us with any problems. We will get back to you as soon as possible.</p>
                    <a href="contact.html" class="btn btn-primary">
                        <i class="bi bi-envelope me-1"></i> Contact
                    </a>
                </div>
            </div>
        </div>

    </div>
    <!-- * App Capsule -->

    <div id="toastPopup" class="toast-box toast-top">
        <a id="toastPopupA" class="text-light">
            <div class="in">
                <div class="text" id="toast-content">
                    
                </div>
            </div>
        </a>
        <button type="button" class="btn btn-sm btn-text-light close-button">OK</button>
    </div>


    <!-- ========= JS Files =========  -->
    <!-- Bootstrap -->
    <script src="assets/js/lib/bootstrap.bundle.min.js"></script>
    <!-- Ionicons -->
    
    <!-- Splide -->
    <script src="assets/js/plugins/splide/splide.min.js"></script>
    <!-- Base Js File -->
    <script src="assets/js/base.js"></script><script src="assets/js/index.umd.min.js"></script>


    <script>
        $(document).ready(function() {
            var xmlhttp = new XMLHttpRequest();
            xmlhttp.onreadystatechange = function() {
            if (this.readyState == 4 && this.status == 200) {
                
                response = JSON.parse(this.responseText);
                about = response[0].about;
                summary = response[0].summary;
                
                var fabout = about.replace(/\[/g, "<");
                fabout = fabout.replace(/\]/g, ">");

                document.getElementById("aboutSummary").innerHTML = `${summary}`;
                document.getElementById("aboutContent").innerHTML = `${fabout}`;
            }
            };
            xmlhttp.open("GET",SITE_URL+`ws.php?getAbout=`,true);
            xmlhttp.send();
        });

        /* global PullToRefresh */
        PullToRefresh.init({
            mainElement: '#appCapsule',
            onRefresh: function() { location.reload(); }
        });
    </script>
</body>

</html>
